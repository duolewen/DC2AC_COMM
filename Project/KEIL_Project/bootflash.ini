FUNC void Setup (void) 
{ 
SP = _RDWORD(0x08010000);          // 堆栈指针 ARM规定从0地址处加载SP
PC = _RDWORD(0x08010004);          // PC 
_WDWORD(0xE000ED08, 0x08010000);   // 中断向量偏移地址 
} 
FUNC void OnResetExec (void) 
{
SP = _RDWORD(0x08010000);          // 堆栈指针 ARM规定从0地址处加载SP
PC = _RDWORD(0x08010004);          // PC 
_WDWORD(0xE000ED08, 0x08010000);   // 中断向量偏移地址 
}
LOAD .\output\T_NA_Comm.axf INCREMENTAL      
// Download，.axf 根据自己的文件名和目录修改
Setup();                             // 调用Setup(); 